{% extends 'generic/object.html' %}
{% load render_table from django_tables2 %}
{% load i18n %}
{% block content %}
<div class="row">
	<div class="col col-md-12">
        <div class="card">
            <h5 class="card-header">{% trans "Settings" %}</h5>
            <table class="table table-hover attr-table">
                <tr>
                    <th scope="Row">{% trans "name" %}</th>
                    <td>{{ object.name }}</td>
                </tr>
                <tr>
                    <th scope="row">{% trans "Configuration" %}</th>
                    <td>
                        <pre class="block">{{ object.config|json }}</pre>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</div>
{% endblock %}
